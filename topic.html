<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAWER — Topic</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .topic-hero {
      padding: 56px 48px 44px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    .breadcrumb a { color: var(--crimson); text-decoration: none; }
    .breadcrumb a:hover { color: var(--crimson-bright); }
    .breadcrumb-sep { color: var(--border-bright); }

    .topic-week-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--crimson);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topic-week-label::before {
      content: '';
      width: 28px; height: 1px;
      background: var(--crimson);
    }

    .topic-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 7vw, 80px);
      line-height: 0.95;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    .topic-desc {
      font-size: 14px;
      color: var(--text-mid);
      font-weight: 300;
      max-width: 500px;
      line-height: 1.7;
    }

    .topic-ghost {
      position: absolute;
      right: 48px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 14vw, 160px);
      color: rgba(192,22,42,0.05);
      line-height: 1;
      pointer-events: none;
      user-select: none;
      letter-spacing: 0.05em;
    }

    /* QUESTION CARDS */
    .questions-section {
      padding: 40px 48px 72px;
    }

    .questions-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .questions-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .questions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .question-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: border-color 0.22s, background 0.22s, transform 0.18s;
      cursor: none;
    }
    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 0; height: 3px;
      background: var(--crimson-bright);
      transition: width 0.3s ease;
    }
    .question-card:hover {
      border-color: var(--border-bright);
      background: var(--bg3);
      transform: translateX(4px);
    }
    .question-card:hover::before { width: 100%; }

    .question-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .question-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: rgba(192,22,42,0.3);
      line-height: 1;
      min-width: 32px;
      transition: color 0.2s;
    }
    .question-card:hover .question-num { color: var(--crimson); }

    .question-info {}

    .question-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .question-meta {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .q-meta-dot { width: 2px; height: 2px; background: var(--crimson-dim); border-radius: 50%; }

    .question-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .step-count-pill {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--crimson);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      transition: border-color 0.2s;
    }
    .question-card:hover .step-count-pill { border-color: var(--border-bright); }

    .question-arrow {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }
    .question-card:hover .question-arrow {
      border-color: var(--border-bright);
      color: var(--crimson-bright);
      transform: translateX(4px);
    }

    /* WEEK NAV */
    .week-nav {
      padding: 0 48px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .week-nav-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px 18px;
      transition: color 0.2s, border-color 0.2s;
    }
    .week-nav-btn:hover { color: var(--text); border-color: var(--border-bright); }
    .week-nav-btn.disabled { opacity: 0.3; pointer-events: none; }
  </style>
</head>
<body>

  <div id="cursor">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <line x1="15" y1="0" x2="15" y2="11.5" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="15" y1="18.5" x2="15" y2="30" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="0" y1="15" x2="11.5" y2="15" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="18.5" y1="15" x2="30" y2="15" stroke="#E8192F" stroke-width="1.5"/>
      <rect x="12" y="12" width="6" height="6" stroke="#E8192F" stroke-width="1.2" fill="none"/>
    </svg>
  </div>

  <div class="page" id="main">

    <nav style="position:sticky;top:0;z-index:50;background:rgba(13,13,13,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:20px 48px;display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" class="nav-logo">
        <div class="nav-dot"></div>
        DRAWER
      </a>
      <div class="nav-center" id="nav-week-label">Week —</div>
      <a href="index.html" class="nav-back">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        All Weeks
      </a>
    </nav>

    <section class="topic-hero" id="topic-hero">
      <div class="corner-mark tl"></div>
      <div class="corner-mark br"></div>

      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">/</span>
        <span id="breadcrumb-week">Week —</span>
      </div>

      <div class="topic-week-label" id="hero-week-label">Week —</div>
      <h1 class="topic-title" id="hero-title">Loading...</h1>
      <p class="topic-desc" id="hero-desc"></p>
      <div class="topic-ghost" id="hero-ghost"></div>
    </section>

    <section class="questions-section">
      <div class="questions-label">Topics in this week</div>
      <div class="questions-list" id="questions-list"></div>
    </section>

    <div class="week-nav">
      <a href="#" class="week-nav-btn disabled" id="btn-prev">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Prev Week
      </a>
      <a href="index.html" style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;">
        All Weeks
      </a>
      <a href="#" class="week-nav-btn disabled" id="btn-next">
        Next Week
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <footer>
      <span>DRAWER &nbsp;·&nbsp; EGD Guide</span>
      <span id="footer-week">Week —</span>
    </footer>

  </div>

  <script>
    // CURSOR
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // GET WEEK ID FROM URL
    const params = new URLSearchParams(window.location.search);
    const weekId = parseInt(params.get('week')) || 1;

    fetch('data/content.json')
      .then(r => r.json())
      .then(data => {
        const week = data.weeks.find(w => w.id === weekId);
        if (!week) { window.location.href = 'index.html'; return; }

        const totalWeeks = data.weeks.length;

        // Fill hero
        document.title = `DRAWER — Week ${week.id}: ${week.title}`;
        document.getElementById('nav-week-label').textContent = `Week ${week.id} — ${week.title}`;
        document.getElementById('breadcrumb-week').textContent = `Week ${week.id}`;
        document.getElementById('hero-week-label').textContent = `Week ${week.id}`;
        document.getElementById('hero-title').textContent = week.title;
        document.getElementById('hero-desc').textContent = week.description;
        document.getElementById('hero-ghost').textContent = `W${String(week.id).padStart(2,'0')}`;
        document.getElementById('footer-week').textContent = `Week ${week.id} — ${week.title}`;

        // Build question cards
        const list = document.getElementById('questions-list');
        week.questions.forEach((q, i) => {
          const card = document.createElement('a');
          card.className = 'question-card';
          card.href = `guide.html?week=${week.id}&question=${q.id}`;
          card.innerHTML = `
            <div class="question-left">
              <div class="question-num">${String(i+1).padStart(2,'0')}</div>
              <div class="question-info">
                <div class="question-title">${q.title}</div>
                <div class="question-meta">
                  <span>${q.steps} steps</span>
                  <span class="q-meta-dot"></span>
                  <span>Week ${week.id}</span>
                </div>
              </div>
            </div>
            <div class="question-right">
              <div class="step-count-pill">${q.steps} Steps</div>
              <div class="question-arrow">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          `;
          list.appendChild(card);
        });

        // Prev/Next week nav
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');
        if (weekId > 1) {
          prevBtn.href = `topic.html?week=${weekId - 1}`;
          prevBtn.classList.remove('disabled');
        }
        if (weekId < totalWeeks) {
          nextBtn.href = `topic.html?week=${weekId + 1}`;
          nextBtn.classList.remove('disabled');
        }

        // Animate in
        document.getElementById('main').classList.add('visible');
      });
  </script>

</body>
</html>
