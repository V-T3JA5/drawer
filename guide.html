<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAWER — Guide</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* PROGRESS BAR */
    .progress-bar-wrap {
      height: 3px;
      background: var(--bg3);
      position: relative;
      z-index: 1;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--crimson-bright);
      transition: width 0.4s ease;
    }

    /* GUIDE HEADER */
    .guide-header {
      padding: 40px 48px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
    }
    .breadcrumb a { color: var(--crimson); text-decoration: none; }
    .breadcrumb a:hover { color: var(--crimson-bright); }
    .breadcrumb-sep { color: rgba(192,22,42,0.35); }

    .guide-question-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 5vw, 60px);
      line-height: 0.95;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }

    .guide-step-counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .guide-step-counter .current { color: var(--crimson-bright); font-size: 14px; }

    /* MAIN GUIDE LAYOUT */
    .guide-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 60vh;
    }

    /* IMAGE PANEL */
    .guide-image-panel {
      border-right: 1px solid var(--border);
      padding: 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 420px;
    }

    .image-frame {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    .image-frame img.loaded { display: block; }

    .image-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .image-placeholder svg { color: rgba(192,22,42,0.2); }
    .image-placeholder-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .image-placeholder-filename {
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      color: rgba(192,22,42,0.4);
      margin-top: -8px;
    }

    /* Image corner marks */
    .image-frame .corner-mark { position: absolute; }
    .image-frame .tl { top: 6px; left: 6px; }
    .image-frame .tr { top: 6px; right: 6px; }
    .image-frame .bl { bottom: 6px; left: 6px; }
    .image-frame .br { bottom: 6px; right: 6px; }

    .image-label {
      margin-top: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* TEXT PANEL */
    .guide-text-panel {
      padding: 40px 44px;
      display: flex;
      flex-direction: column;
    }

    .step-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--crimson);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .step-label::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--crimson);
    }

    .step-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .step-content {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.8;
      font-weight: 300;
      flex: 1;
    }

    .step-content strong {
      color: var(--text);
      font-weight: 500;
    }

    .step-tip {
      margin-top: 24px;
      padding: 16px 18px;
      border-left: 2px solid var(--crimson);
      background: var(--crimson-glow);
      border-radius: 0 2px 2px 0;
    }
    .step-tip-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--crimson);
      margin-bottom: 6px;
    }
    .step-tip-text {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.65;
    }

    /* NAVIGATION */
    .guide-nav {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .nav-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 24px;
      cursor: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .nav-btn:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--border-bright);
      background: var(--bg3);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .nav-btn.primary {
      background: var(--crimson);
      border-color: var(--crimson);
      color: var(--text);
    }
    .nav-btn.primary:hover:not(:disabled) {
      background: var(--crimson-bright);
      border-color: var(--crimson-bright);
    }

    .nav-center-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .nav-step-dots {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 300px;
    }
    .step-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      transition: background 0.2s, border-color 0.2s;
      cursor: none;
    }
    .step-dot.active {
      background: var(--crimson-bright);
      border-color: var(--crimson-bright);
    }
    .step-dot.done {
      background: var(--crimson-dim);
      border-color: var(--crimson-dim);
    }

    .step-fraction {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }
    .step-fraction span { color: var(--crimson); }

    /* TRANSITIONS */
    .guide-body {
      transition: opacity 0.25s ease;
    }
    .guide-body.fading { opacity: 0; }
  </style>
</head>
<body>

  <div id="cursor">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <line x1="15" y1="0" x2="15" y2="11.5" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="15" y1="18.5" x2="15" y2="30" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="0" y1="15" x2="11.5" y2="15" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="18.5" y1="15" x2="30" y2="15" stroke="#E8192F" stroke-width="1.5"/>
      <rect x="12" y="12" width="6" height="6" stroke="#E8192F" stroke-width="1.2" fill="none"/>
    </svg>
  </div>

  <div class="page visible" id="main">

    <!-- NAV -->
    <nav style="position:sticky;top:0;z-index:50;background:rgba(13,13,13,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:20px 48px;display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" class="nav-logo">
        <div class="nav-dot"></div>
        DRAWER
      </a>
      <div class="nav-center" id="nav-label" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dim);">Step — / —</div>
      <a href="#" class="nav-back" id="nav-back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </a>
    </nav>

    <!-- PROGRESS BAR -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- GUIDE HEADER -->
    <div class="guide-header">
      <div class="corner-mark tl"></div>
      <div class="corner-mark tr"></div>

      <div class="breadcrumb" id="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">/</span>
        <a href="#" id="bc-week">Week —</a>
        <span class="breadcrumb-sep">/</span>
        <span id="bc-question">—</span>
      </div>

      <h1 class="guide-question-title" id="question-title">Loading...</h1>
      <div class="guide-step-counter">
        <span>Step</span>
        <span class="current" id="step-current">—</span>
        <span>of</span>
        <span id="step-total">—</span>
      </div>
    </div>

    <!-- GUIDE BODY -->
    <div class="guide-body" id="guide-body">
      <!-- IMAGE -->
      <div class="guide-image-panel">
        <div class="image-frame" id="image-frame">
          <div class="corner-mark tl"></div>
          <div class="corner-mark tr"></div>
          <div class="corner-mark bl"></div>
          <div class="corner-mark br"></div>
          <img id="step-img" src="" alt="Step illustration">
          <div class="image-placeholder" id="img-placeholder">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="8" y="8" width="32" height="32" stroke="currentColor" stroke-width="1.5" rx="1"/>
              <line x1="24" y1="8" x2="24" y2="40" stroke="currentColor" stroke-width="1"/>
              <line x1="8" y1="24" x2="40" y2="24" stroke="currentColor" stroke-width="1"/>
              <rect x="21" y="21" width="6" height="6" stroke="currentColor" stroke-width="1" fill="none"/>
            </svg>
            <div class="image-placeholder-text">Step Illustration</div>
            <div class="image-placeholder-filename" id="img-filename"></div>
          </div>
        </div>
        <div class="image-label" id="image-label">Figure — / —</div>
      </div>

      <!-- TEXT -->
      <div class="guide-text-panel">
        <div class="step-label" id="step-label">Step —</div>
        <div class="step-title" id="step-title">Loading...</div>
        <div class="step-content" id="step-content">
          Loading step content...
        </div>
        <div class="step-tip" id="step-tip" style="display:none">
          <div class="step-tip-label">Tip</div>
          <div class="step-tip-text" id="step-tip-text"></div>
        </div>
      </div>
    </div>

    <!-- NAVIGATION -->
    <div class="guide-nav">
      <button class="nav-btn" id="btn-prev" disabled>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Previous
      </button>

      <div class="nav-center-info">
        <div class="nav-step-dots" id="step-dots"></div>
        <div class="step-fraction">Step <span id="frac-current">—</span> / <span id="frac-total">—</span></div>
      </div>

      <button class="nav-btn primary" id="btn-next">
        Next
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <footer>
      <span>DRAWER &nbsp;·&nbsp; EGD Guide</span>
      <span id="footer-label">Week — · Step — / —</span>
    </footer>

  </div>

  <script>
    // CURSOR
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // URL PARAMS
    const params = new URLSearchParams(window.location.search);
    const weekId = parseInt(params.get('week')) || 1;
    const questionId = parseInt(params.get('question')) || 1;
    let currentStep = parseInt(params.get('step')) || 1;
    let totalSteps = 1;
    let weekData = null;
    let questionData = null;

    // PLACEHOLDER STEPS (replace with your real content)
    // Each step: { title, content, tip (optional), image (optional filename) }
    function generatePlaceholderSteps(question, count) {
      const steps = [];
      for (let i = 1; i <= count; i++) {
        steps.push({
          title: `Step ${i} — ${question.title}`,
          content: `This is the instruction for step ${i} of <strong>${question.title}</strong>. Replace this text with your actual step-by-step drawing instructions. Include details about what lines to draw, measurements to use, and techniques to apply.`,
          tip: i % 5 === 0 ? `Helpful tip for step ${i}: always check your line weights match the EGD standard before proceeding to the next step.` : null,
          image: `images/weeks/w${weekId}_q${questionId}_s${String(i).padStart(2,'0')}.png`
        });
      }
      return steps;
    }

    let steps = [];

    function renderStep(n) {
      const step = steps[n - 1];
      if (!step) return;

      const body = document.getElementById('guide-body');
      body.classList.add('fading');

      setTimeout(() => {
        // Header
        document.getElementById('step-current').textContent = n;
        document.getElementById('step-label').textContent = `Step ${n}`;
        document.getElementById('step-title').textContent = step.title;
        document.getElementById('step-content').innerHTML = step.content;
        document.getElementById('nav-label').textContent = `Step ${n} / ${totalSteps}`;
        document.getElementById('frac-current').textContent = n;
        document.getElementById('footer-label').textContent = `Week ${weekId} · Step ${n} / ${totalSteps}`;
        document.getElementById('image-label').textContent = `Figure ${n} / ${totalSteps}`;

        // Tip
        const tipEl = document.getElementById('step-tip');
        if (step.tip) {
          document.getElementById('step-tip-text').textContent = step.tip;
          tipEl.style.display = 'block';
        } else {
          tipEl.style.display = 'none';
        }

        // Image
        const img = document.getElementById('step-img');
        const placeholder = document.getElementById('img-placeholder');
        document.getElementById('img-filename').textContent = step.image || '';
        if (step.image) {
          img.src = step.image;
          img.onload = () => { img.classList.add('loaded'); placeholder.style.display = 'none'; };
          img.onerror = () => { img.classList.remove('loaded'); placeholder.style.display = 'flex'; };
        } else {
          img.classList.remove('loaded');
          placeholder.style.display = 'flex';
        }

        // Progress
        const pct = (n / totalSteps) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';

        // Dots
        const dotsEl = document.getElementById('step-dots');
        dotsEl.innerHTML = '';
        const maxDots = Math.min(totalSteps, 30);
        for (let i = 1; i <= maxDots; i++) {
          const dot = document.createElement('div');
          dot.className = 'step-dot' + (i === n ? ' active' : i < n ? ' done' : '');
          dot.title = `Step ${i}`;
          dot.addEventListener('click', () => navigateTo(i));
          dotsEl.appendChild(dot);
        }
        if (totalSteps > 30) {
          const more = document.createElement('div');
          more.style.cssText = 'font-family:Barlow Condensed,sans-serif;font-size:10px;letter-spacing:.15em;color:var(--text-dim);';
          more.textContent = `+${totalSteps - 30}`;
          dotsEl.appendChild(more);
        }

        // Buttons
        document.getElementById('btn-prev').disabled = (n === 1);
        const nextBtn = document.getElementById('btn-next');
        if (n === totalSteps) {
          nextBtn.textContent = '✓ Finish';
          nextBtn.onclick = () => { window.location.href = `topic.html?week=${weekId}`; };
        } else {
          nextBtn.innerHTML = `Next <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
          nextBtn.onclick = () => navigateTo(n + 1);
        }

        // Update URL without reload
        const url = new URL(window.location);
        url.searchParams.set('step', n);
        window.history.replaceState({}, '', url);

        body.classList.remove('fading');
      }, 200);
    }

    function navigateTo(n) {
      if (n < 1 || n > totalSteps) return;
      currentStep = n;
      renderStep(currentStep);
    }

    // Button listeners
    document.getElementById('btn-prev').addEventListener('click', () => navigateTo(currentStep - 1));
    document.getElementById('btn-next').addEventListener('click', () => navigateTo(currentStep + 1));

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigateTo(currentStep + 1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigateTo(currentStep - 1);
    });

    // LOAD DATA
    fetch('data/content.json')
      .then(r => r.json())
      .then(data => {
        weekData = data.weeks.find(w => w.id === weekId);
        if (!weekData) { window.location.href = 'index.html'; return; }

        questionData = weekData.questions.find(q => q.id === questionId);
        if (!questionData) { window.location.href = `topic.html?week=${weekId}`; return; }

        totalSteps = questionData.steps;

        // Fill static labels
        document.title = `DRAWER — ${questionData.title}`;
        document.getElementById('question-title').textContent = questionData.title;
        document.getElementById('step-total').textContent = totalSteps;
        document.getElementById('frac-total').textContent = totalSteps;
        document.getElementById('bc-week').textContent = `Week ${weekId}`;
        document.getElementById('bc-week').href = `topic.html?week=${weekId}`;
        document.getElementById('bc-question').textContent = questionData.title;
        document.getElementById('nav-back-link').href = `topic.html?week=${weekId}`;

        // Generate steps
        steps = generatePlaceholderSteps(questionData, totalSteps);

        // Render
        if (currentStep > totalSteps) currentStep = 1;
        renderStep(currentStep);
      });
  </script>

</body>
</html>
