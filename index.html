<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAWER — Your EGD Guide</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* INTRO */
    #intro {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      flex-direction: column;
    }

    #intro-letters {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .intro-char {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 14vw, 160px);
      color: var(--red-bright);
      line-height: 1;
      display: inline-block;
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      letter-spacing: 0.06em;
    }
    .intro-char.visible { opacity: 1; transform: translateY(0); }
    .intro-char.exit    { opacity: 0; transform: translateY(-40px); }

    #intro-bar {
      width: 0;
      height: 1px;
      background: var(--red);
      transition: width 0.5s ease;
      margin-top: 6px;
    }

    #intro-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 18px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    /* NAV — DRAWER centered */
    .home-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 22px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .home-nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--red-bright);
      letter-spacing: 0.12em;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-nav-tagline {
      position: absolute;
      right: 48px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* HERO — compact, no stats */
    .hero {
      padding: 56px 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red-bright);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::before {
      content: '';
      width: 28px; height: 1px;
      background: var(--red-bright);
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 96px);
      line-height: 0.92;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }
    .hero-title .accent { color: var(--crimson-bright); }

    .hero-desc {
      font-size: 14px;
      color: var(--text-mid);
      font-weight: 300;
      max-width: 440px;
      line-height: 1.75;
    }

    .hero-deco {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.05;
      pointer-events: none;
    }

    /* SECTION LABEL */
    .section-label {
      padding: 36px 48px 22px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* CARDS */
    .cards-grid {
      padding: 0 48px 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }

    .week-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 26px 22px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      text-decoration: none;
      display: block;
      cursor: none;
    }
    .week-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 0;
      background: var(--red-bright);
      transition: height 0.3s ease;
    }
    .week-card:hover {
      border-color: var(--border-bright);
      background: var(--bg3);
      transform: translateY(-3px);
    }
    .week-card:hover::before { height: 100%; }

    .card-week-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--red-bright);
      margin-bottom: 10px;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .card-meta {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .meta-dot { width: 2px; height: 2px; background: var(--red-bright); border-radius: 50%; }

    .card-ghost-num {
      position: absolute;
      bottom: 6px;
      right: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: rgba(192,22,42,0.08);
      line-height: 1;
      pointer-events: none;
      transition: color 0.3s;
      user-select: none;
    }
    .week-card:hover .card-ghost-num { color: rgba(192,22,42,0.18); }

    .card-arrow {
      position: absolute;
      bottom: 18px;
      right: 18px;
      width: 26px; height: 26px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.2s, transform 0.2s, border-color 0.2s;
    }
    .week-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
      border-color: var(--border-bright);
    }
    .card-arrow svg { color: var(--red-bright); }

    /* TJ WATERMARK FOOTER */
    .tj-watermark-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 0 40px;
      overflow: hidden;
      margin-top: 8px;
    }

    .tj-watermark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(120px, 22vw, 260px);
      color: transparent;
      letter-spacing: 0.08em;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      /* Crimson glow outline */
      -webkit-text-stroke: 1px rgba(192, 22, 42, 0.35);
      text-shadow:
        0 0 40px rgba(192, 22, 42, 0.25),
        0 0 80px rgba(192, 22, 42, 0.12),
        0 0 140px rgba(192, 22, 42, 0.06);
      animation: tj-pulse 4s ease-in-out infinite;
    }

    @keyframes tj-pulse {
      0%, 100% {
        -webkit-text-stroke: 1px rgba(192, 22, 42, 0.35);
        text-shadow:
          0 0 40px rgba(192, 22, 42, 0.25),
          0 0 80px rgba(192, 22, 42, 0.12),
          0 0 140px rgba(192, 22, 42, 0.06);
      }
      50% {
        -webkit-text-stroke: 1px rgba(232, 25, 47, 0.55);
        text-shadow:
          0 0 40px rgba(232, 25, 47, 0.45),
          0 0 80px rgba(232, 25, 47, 0.22),
          0 0 160px rgba(232, 25, 47, 0.1);
      }
    }

    .tj-watermark-line {
      position: absolute;
      bottom: 38px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- CURSOR -->
  <div id="cursor">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <line x1="15" y1="0" x2="15" y2="11.5" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="15" y1="18.5" x2="15" y2="30" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="0" y1="15" x2="11.5" y2="15" stroke="#E8192F" stroke-width="1.5"/>
      <line x1="18.5" y1="15" x2="30" y2="15" stroke="#E8192F" stroke-width="1.5"/>
      <rect x="12" y="12" width="6" height="6" stroke="#E8192F" stroke-width="1.2" fill="none"/>
    </svg>
  </div>

  <!-- INTRO SCREEN -->
  <div id="intro">
    <div id="intro-letters"></div>
    <div id="intro-bar"></div>
    <div id="intro-sub">Your EGD Guide</div>
  </div>

  <!-- MAIN PAGE -->
  <div class="page" id="main">

    <!-- NAV: DRAWER centered -->
    <nav class="home-nav" style="position:sticky;top:0;z-index:50;">
      <a href="index.html" class="home-nav-logo">
        <div class="nav-dot"></div>
        DRAWER
      </a>
      <div class="home-nav-tagline">Your EGD Guide</div>
    </nav>

    <!-- HERO: no stats -->
    <section class="hero">
      <div class="corner-mark tl"></div>
      <div class="corner-mark tr"></div>
      <div class="corner-mark bl"></div>
      <div class="corner-mark br"></div>

      <div class="hero-eyebrow">Your EGD Guide</div>
      <h1 class="hero-title">
        MASTER<br><span class="accent">TECHNICAL</span><br>DRAWING
      </h1>
      <p class="hero-desc">
        A step-by-step guide through Engineering Graphics &amp; Design.
        Each week builds on the last — from basic line work to complex isometric projections.
      </p>

      <div class="hero-deco">
        <svg width="280" height="280" viewBox="0 0 280 280" fill="none">
          <circle cx="140" cy="140" r="100" stroke="#C0162A" stroke-width="1"/>
          <circle cx="140" cy="140" r="64" stroke="#C0162A" stroke-width="1"/>
          <circle cx="140" cy="140" r="28" stroke="#C0162A" stroke-width="1"/>
          <line x1="140" y1="10" x2="140" y2="270" stroke="#C0162A" stroke-width="0.8"/>
          <line x1="10" y1="140" x2="270" y2="140" stroke="#C0162A" stroke-width="0.8"/>
          <line x1="69" y1="69" x2="211" y2="211" stroke="#C0162A" stroke-width="0.5" stroke-dasharray="4 4"/>
          <line x1="211" y1="69" x2="69" y2="211" stroke="#C0162A" stroke-width="0.5" stroke-dasharray="4 4"/>
          <rect x="136.5" y="136.5" width="7" height="7" stroke="#C0162A" stroke-width="1" fill="none"/>
        </svg>
      </div>
    </section>

    <div class="divider"></div>

    <div class="section-label">Course Outline</div>

    <div class="cards-grid" id="cards-grid"></div>

    <!-- TJ WATERMARK -->
    <div class="tj-watermark-wrap">
      <div class="tj-watermark">TJ</div>
      <div class="tj-watermark-line">DRAWER &nbsp;·&nbsp; EGD Guide</div>
    </div>

  </div>

  <script>
    // CURSOR
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // LOAD DATA & BUILD CARDS
    fetch('data/content.json')
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('cards-grid');
        data.weeks.forEach(week => {
          const totalSteps = week.questions.reduce((a, q) => a + q.steps, 0);
          const card = document.createElement('a');
          card.className = 'week-card';
          card.href = `topic.html?week=${week.id}`;
          card.innerHTML = `
            <div class="card-week-label">Week ${week.id}</div>
            <div class="card-title">${week.title}</div>
            <div class="card-meta">
              <span>${week.questions.length} Topics</span>
              <span class="meta-dot"></span>
              <span>${totalSteps} Steps</span>
            </div>
            <div class="card-ghost-num">${String(week.id).padStart(2,'0')}</div>
            <div class="card-arrow">
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                <path d="M2 5.5h7M6 2.5l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          `;
          grid.appendChild(card);
        });
      });

    // INTRO ANIMATION
    const introEl = document.getElementById('intro');
    const lettersEl = document.getElementById('intro-letters');
    const barEl    = document.getElementById('intro-bar');
    const subEl    = document.getElementById('intro-sub');
    const mainEl   = document.getElementById('main');

    function showChars(chars, delayMs = 80) {
      lettersEl.innerHTML = '';
      return chars.map((c, i) => {
        const s = document.createElement('span');
        s.className = 'intro-char';
        s.textContent = c;
        lettersEl.appendChild(s);
        setTimeout(() => s.classList.add('visible'), i * delayMs);
        return s;
      });
    }

    function hideChars(spans) {
      return new Promise(resolve => {
        spans.forEach((s, i) => {
          setTimeout(() => s.classList.replace('visible', 'exit'), i * 45);
        });
        setTimeout(resolve, 300 + spans.length * 45);
      });
    }

    async function runIntro() {
      await new Promise(r => setTimeout(r, 300));

      const tjSpans = showChars(['T','J'], 150);
      setTimeout(() => { barEl.style.width = '60px'; }, 100);
      await new Promise(r => setTimeout(r, 1300));

      await hideChars(tjSpans);
      barEl.style.width = '0';
      await new Promise(r => setTimeout(r, 180));

      showChars(['D','R','A','W','E','R'], 65);
      setTimeout(() => { barEl.style.width = '148px'; }, 80);
      setTimeout(() => { subEl.style.opacity = '1'; }, 500);
      await new Promise(r => setTimeout(r, 1500));

      introEl.style.transition = 'opacity 0.65s ease';
      introEl.style.opacity = '0';
      mainEl.classList.add('visible');
      setTimeout(() => { introEl.style.display = 'none'; }, 700);
    }

    runIntro();
  </script>

</body>
</html>
